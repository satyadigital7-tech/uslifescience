<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2F6FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D7;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#53B635;stop-opacity:0.06" />
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bgGrad)" />
  
  <!-- Subtle grid lines -->
  <g opacity="0.3" stroke="#0078D7" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="900" />
    <line x1="300" y1="0" x2="300" y2="900" />
    <line x1="500" y1="0" x2="500" y2="900" />
    <line x1="700" y1="0" x2="700" y2="900" />
    <line x1="900" y1="0" x2="900" y2="900" />
    <line x1="1100" y1="0" x2="1100" y2="900" />
    <line x1="1300" y1="0" x2="1300" y2="900" />
    
    <line x1="0" y1="100" x2="1440" y2="100" />
    <line x1="0" y1="300" x2="1440" y2="300" />
    <line x1="0" y1="500" x2="1440" y2="500" />
    <line x1="0" y1="700" x2="1440" y2="700" />
  </g>
  
  <!-- Heart rate pulse lines -->
  <path d="M 0 450 L 300 450 L 320 420 L 340 480 L 360 440 L 370 460 L 390 450 L 800 450 L 820 400 L 840 500 L 860 430 L 880 470 L 900 450 L 1440 450" 
        fill="none" stroke="#0078D7" stroke-width="1.5" opacity="0.08" />
        
  <!-- Giant scientific capsule silhouette -->
  <g transform="translate(1000, 200) rotate(25)" fill="url(#pillGrad)" stroke="#0078D7" stroke-width="1" stroke-opacity="0.1">
    <rect x="0" y="0" width="150" height="300" rx="75" />
    <line x1="0" y1="150" x2="150" y2="150" stroke="#0078D7" stroke-width="1" stroke-opacity="0.1" />
  </g>
  
  <!-- Biological cells / circles -->
  <circle cx="200" cy="150" r="80" fill="#53B635" opacity="0.03" />
  <circle cx="150" cy="700" r="120" fill="#0078D7" opacity="0.04" />
  <circle cx="750" cy="300" r="50" fill="#0078D7" opacity="0.02" />
  <circle cx="1200" cy="750" r="90" fill="#53B635" opacity="0.03" />
</svg>
